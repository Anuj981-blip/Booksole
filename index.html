<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOOKSOLE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --y:#e8e800;--b:#6699ff;--g:#33dd66;--r:#ff4444;
  --dim:#444455;--faint:#1a1a2a;--text:#e0e0e0;--subtext:#aaaacc;
  --panel:#06060f;--panelborder:#1e1e32;--highlight:#8877ff;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#000;color:var(--text);font-family:'Courier Prime',monospace;overflow:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:9999;}
#screen{width:100%;height:100vh;display:flex;flex-direction:column;}

/* ── INTRO ── */
#intro{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#000;position:relative;}
#intro canvas{image-rendering:pixelated;cursor:pointer;max-width:100%;max-height:100%;}
#intro-skip{position:fixed;bottom:14px;right:18px;font-family:'Press Start 2P',monospace;font-size:7px;color:#333;background:none;border:1px solid #1a1a1a;padding:5px 10px;cursor:pointer;letter-spacing:1px;}
#intro-skip:hover{color:#888;border-color:#444;}

/* ── BOOT ── */
#boot{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#000;position:relative;overflow:hidden;cursor:pointer;}
.bg-grid{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,60,200,.04) 60px,rgba(0,60,200,.04) 61px),repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(0,60,200,.04) 60px,rgba(0,60,200,.04) 61px);}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(136,119,255,.12);animation:ringpulse 4s ease-in-out infinite;}
@keyframes ringpulse{0%,100%{transform:scale(1);opacity:.4;}50%{transform:scale(1.05);opacity:1;}}
.logo-txt{font-family:'Press Start 2P',monospace;font-size:clamp(20px,4vw,38px);color:var(--y);text-shadow:4px 4px 0 #888800,8px 8px 0 #444400;letter-spacing:3px;}
.drips{display:flex;gap:0;height:28px;align-items:flex-start;padding-left:4px;}
.drip{border-radius:0 0 50% 50%;background:var(--y);animation:dripani 2.5s ease-in-out infinite;}
@keyframes dripani{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.3);}}
.logo-sub{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--b);letter-spacing:6px;margin-top:26px;}
.boot-ver{font-size:11px;color:#555;letter-spacing:3px;margin-top:6px;}
.boot-prog{margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.bar-wrap{width:260px;height:5px;background:#111;border:1px solid #222;}
.bar-fill{height:100%;width:0;background:var(--y);transition:width .08s linear;}
.boot-msg{font-family:'Press Start 2P',monospace;font-size:7px;color:#888;letter-spacing:2px;height:18px;text-align:center;}
.boot-blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── LIBRARY ── */
#library{display:none;flex-direction:column;height:100%;background:#000;}
.lib-bar{background:#07070f;border-bottom:2px solid var(--y);padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.lib-logo{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--y);letter-spacing:2px;}
.lib-count{font-size:11px;color:#666;letter-spacing:1px;}
.lib-add{margin-left:auto;font-family:'Press Start 2P',monospace;font-size:7px;color:#999;background:none;border:1px solid #333;padding:6px 10px;cursor:pointer;letter-spacing:1px;}
.lib-add:hover{color:var(--y);border-color:var(--y);}
.lib-body{flex:1;overflow-y:auto;padding:28px 32px;}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:20px;}
.cart-card{cursor:pointer;border:1px solid #1e1e2e;background:#06060f;overflow:hidden;transition:all .15s;position:relative;}
.cart-card:hover{border-color:#5544bb;transform:translateY(-3px);box-shadow:0 8px 24px rgba(85,68,187,.25);}
.cc-cover{width:100%;aspect-ratio:3/4;background:#0a0a14;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.cc-cover img{width:100%;height:100%;object-fit:cover;}
.cc-cover-fallback{font-family:'Press Start 2P',monospace;font-size:28px;color:#2a2a3a;}
.cc-badge{position:absolute;top:6px;right:6px;font-family:'Press Start 2P',monospace;font-size:6px;padding:3px 6px;letter-spacing:1px;}
.cc-badge.gyg{background:rgba(204,34,34,.9);color:#fff;}
.cc-badge.cg{background:rgba(85,136,255,.9);color:#fff;}
.cc-badge.new{background:rgba(34,204,68,.9);color:#000;}
.cc-info{padding:10px;}
.cc-title{font-family:'Press Start 2P',monospace;font-size:6px;color:#aaa;letter-spacing:1px;line-height:1.7;margin-bottom:5px;}
.cc-author{font-size:10px;color:#666;}
.cc-prog{margin-top:6px;display:flex;align-items:center;gap:6px;}
.cc-pbar{flex:1;height:3px;background:#1a1a2a;}
.cc-pfill{height:100%;background:var(--b);}
.cc-pct{font-family:'Press Start 2P',monospace;font-size:5px;color:#666;}
.cart-card.add-card{border-style:dashed;border-color:#1e1e2e;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:220px;}
.cart-card.add-card:hover{border-color:var(--b);}
.add-ico{font-family:'Press Start 2P',monospace;font-size:24px;color:#1e1e2e;}
.cart-card.add-card:hover .add-ico{color:var(--b);}
.add-lbl{font-family:'Press Start 2P',monospace;font-size:7px;color:#333;letter-spacing:1px;}
.cart-card.add-card:hover .add-lbl{color:var(--b);}

/* ── DETAIL PANEL ── */
#detail{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:900;align-items:center;justify-content:center;}
.det-box{background:#060610;border:1px solid var(--highlight);max-width:680px;width:92%;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(136,119,255,.2);}
.det-top{display:flex;gap:0;flex-shrink:0;}
.det-cover{width:160px;min-height:220px;flex-shrink:0;background:#0a0a14;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.det-cover img{width:100%;height:100%;object-fit:cover;}
.det-cover-fallback{font-family:'Press Start 2P',monospace;font-size:36px;color:#2a2a3a;}
.det-meta{flex:1;padding:20px;display:flex;flex-direction:column;gap:8px;overflow:hidden;}
.det-title{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--y);letter-spacing:1px;line-height:1.7;}
.det-author{font-size:12px;color:var(--b);margin-top:2px;}
.det-pub{font-size:11px;color:#666;margin-top:2px;}
.det-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.det-tag{font-family:'Press Start 2P',monospace;font-size:6px;padding:3px 8px;border:1px solid #333;color:#888;letter-spacing:1px;}
.det-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:auto;}
.det-stat{padding:7px 10px;background:#0a0a18;border:1px solid #1e1e2e;}
.det-sl{font-size:10px;color:#888;}
.det-sv{font-family:'Press Start 2P',monospace;font-size:9px;color:#ccc;margin-top:3px;}
.det-desc{padding:14px 20px;font-size:12px;color:#888;line-height:1.9;overflow-y:auto;border-top:1px solid #1a1a2a;max-height:140px;}
.det-actions{padding:14px 20px;border-top:1px solid #1a1a2a;display:flex;gap:10px;flex-shrink:0;}
.det-play{font-family:'Press Start 2P',monospace;font-size:9px;background:#0a0014;border:2px solid var(--y);color:var(--y);padding:11px 22px;cursor:pointer;letter-spacing:1px;}
.det-play:hover{background:var(--y);color:#000;}
.det-del{font-family:'Press Start 2P',monospace;font-size:7px;background:none;border:1px solid #222;color:#555;padding:11px 14px;cursor:pointer;letter-spacing:1px;margin-left:auto;}
.det-del:hover{color:var(--r);border-color:var(--r);}
.det-close{font-family:'Press Start 2P',monospace;font-size:7px;background:none;border:1px solid #222;color:#555;padding:11px 14px;cursor:pointer;letter-spacing:1px;}
.det-close:hover{color:var(--subtext);border-color:#666;}

/* ── PARSING ── */
#parsing{display:none;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;}
.p-logo{font-family:'Press Start 2P',monospace;font-size:16px;color:var(--y);letter-spacing:4px;}
.plog{font-size:11px;color:#777;height:90px;overflow-y:auto;width:320px;}
.plog p{padding:1px 0;}.plog p.ok{color:var(--g);}.plog p.warn{color:var(--y);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100%;}
.topbar{background:#07070f;border-bottom:2px solid var(--y);padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.tlogo{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--y);letter-spacing:2px;}
.tbadge{font-family:'Courier Prime',monospace;font-size:9px;padding:2px 7px;border:1px solid #333;color:#666;letter-spacing:2px;}
.tbook{font-size:11px;color:var(--b);margin-left:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px;}
.tright{margin-left:auto;display:flex;gap:6px;}
.tbtn{font-family:'Press Start 2P',monospace;font-size:7px;color:#888;background:none;border:1px solid #333;padding:5px 8px;cursor:pointer;letter-spacing:1px;}
.tbtn:hover{color:var(--y);border-color:var(--y);}
.tbtn.danger:hover{color:var(--r);border-color:var(--r);}
.body{display:grid;grid-template-columns:190px 1fr 210px;flex:1;overflow:hidden;}

/* LEFT PANEL */
.lp{border-right:1px solid #1a1a2a;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
.ph{font-family:'Press Start 2P',monospace;font-size:7px;letter-spacing:2px;color:#666;padding:9px 10px 7px;border-bottom:1px solid #111;}
.saves{flex:1;overflow-y:auto;padding:5px;}
.sv{padding:7px 9px;border:1px solid transparent;cursor:pointer;margin-bottom:3px;}
.sv:hover{background:#0c0c18;border-color:#2a2a44;}
.sv.cur{background:#080014;border-color:#5544aa;}
.sv-name{font-family:'Press Start 2P',monospace;font-size:7px;color:#999;letter-spacing:1px;}
.sv.cur .sv-name{color:var(--y);}
.sv-sub{font-size:10px;color:#555;margin-top:3px;}
.sv-del{float:right;color:#333;background:none;border:none;cursor:pointer;font-size:11px;font-family:monospace;line-height:1;}
.sv-del:hover{color:var(--r);}
.newrun{margin:5px;padding:8px;border:1px dashed #1e1e2e;text-align:center;font-family:'Press Start 2P',monospace;font-size:7px;color:#444;cursor:pointer;letter-spacing:1px;}
.newrun:hover{border-color:#555;color:#999;}
.emap{border-top:1px solid #111;padding:10px;}
.emap-h{font-family:'Press Start 2P',monospace;font-size:6px;color:#555;margin-bottom:7px;letter-spacing:1px;}
.edots{display:flex;flex-wrap:wrap;gap:3px;}
.edot{width:12px;height:12px;background:#0d0d0d;border:1px solid #1a1a1a;cursor:default;transition:all .2s;}
.edot.good{background:var(--g);border-color:var(--g);}
.edot.bad{background:var(--r);border-color:var(--r);}
.edot.neutral{background:var(--y);border-color:var(--y);}
.emap-c{font-size:10px;color:#666;margin-top:6px;}

/* MAIN PANEL */
.mp{display:flex;flex-direction:column;overflow:hidden;background:#030308;}
.mbc{font-size:10px;color:#777;padding:7px 18px;border-bottom:1px solid #111;flex-shrink:0;display:flex;align-items:center;gap:12px;}
.mbc-info{flex:1;color:#999;}
.back-btn{font-family:'Press Start 2P',monospace;font-size:6px;color:#777;background:none;border:1px solid #333;padding:3px 7px;cursor:pointer;letter-spacing:1px;}
.back-btn:hover{color:var(--b);border-color:var(--b);}
.back-btn:disabled{opacity:.25;cursor:default;}
.font-ctrl{display:flex;gap:4px;flex-shrink:0;}
.fcbtn{font-family:'Press Start 2P',monospace;font-size:8px;color:#777;background:none;border:1px solid #333;padding:2px 6px;cursor:pointer;}
.fcbtn:hover{color:var(--y);border-color:var(--y);}
.story{flex:1;overflow-y:auto;padding:22px 26px;}
.pg-id{font-family:'Press Start 2P',monospace;font-size:7px;color:#555;margin-bottom:14px;letter-spacing:2px;}
.path-row{display:flex;flex-wrap:wrap;gap:3px;align-items:center;margin-bottom:16px;}
.pn{font-size:10px;padding:2px 7px;border:1px solid #1e1e2e;color:#555;cursor:pointer;transition:all .1s;}
.pn:hover{color:var(--b);border-color:#5544bb;}
.pn.cur{border-color:#5544bb;color:var(--b);cursor:default;}
.parr{color:#2a2a2a;font-size:10px;padding:0 2px;}
.stxt{color:#ddd;line-height:2.1;margin-bottom:22px;white-space:pre-wrap;}
.ch{font-family:'Press Start 2P',monospace;font-size:7px;color:#666;margin-bottom:10px;letter-spacing:2px;}
.choices{display:flex;flex-direction:column;gap:6px;}
.cbtn{background:#050510;border:1px solid #252535;padding:12px 16px;color:#bbb;cursor:pointer;font-family:'Courier Prime',monospace;text-align:left;display:flex;gap:12px;transition:all .12s;font-size:13px;}
.cbtn:hover{background:#0a0020;border-color:#6655cc;color:var(--y);}
.cn{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--b);min-width:18px;margin-top:2px;flex-shrink:0;}
.key-hint{font-family:'Press Start 2P',monospace;font-size:6px;color:#333;margin-top:16px;letter-spacing:1px;}
.ending-wrap{text-align:center;padding:40px 20px;}
.ending-sym{font-family:'Press Start 2P',monospace;font-size:36px;margin-bottom:16px;}
.ending-sym.good{color:var(--g);text-shadow:0 0 20px rgba(51,221,102,.5);}
.ending-sym.bad{color:var(--r);text-shadow:0 0 20px rgba(255,68,68,.5);}
.ending-sym.neutral{color:var(--y);text-shadow:0 0 20px rgba(232,232,0,.4);}
.etype{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:2px;margin-bottom:8px;}
.etype.good{color:var(--g);}.etype.bad{color:var(--r);}.etype.neutral{color:var(--y);}
.elbl{font-size:15px;color:#888;margin-bottom:16px;}
.etxt{color:#bbb;font-size:13px;line-height:2;margin-bottom:24px;max-width:380px;margin-left:auto;margin-right:auto;}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.rbtn{background:#060612;border:1px solid #5544aa;padding:11px 20px;color:var(--b);cursor:pointer;font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;}
.rbtn:hover{background:#0e0030;color:var(--y);border-color:var(--y);}

/* RIGHT PANEL */
.rp{border-left:1px solid #1a1a2a;background:var(--panel);display:flex;flex-direction:column;overflow:hidden;}
.achs{flex:1;overflow-y:auto;padding:5px;}
.ach{padding:9px 10px;border:1px solid #111;margin-bottom:3px;}
.ach.on{background:#001a0a;border-color:#0d3318;}
.ach.off{opacity:.35;}
.ach-n{font-family:'Press Start 2P',monospace;font-size:6px;color:#777;letter-spacing:1px;}
.ach.on .ach-n{color:var(--g);}
.ach-d{font-size:10px;color:#444;margin-top:3px;}
.ach.on .ach-d{color:#668;}
.stats{border-top:1px solid #111;padding:10px;}
.srow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #0d0d0d;}
.srow:last-child{border:none;}
.sl{font-size:11px;color:#777;}
.sv2{font-family:'Press Start 2P',monospace;font-size:8px;color:#bbb;}

/* JOURNAL */
#journal{display:none;flex-direction:column;height:100%;}
.jt{background:#07070f;border-bottom:2px solid var(--y);padding:9px 16px;display:flex;align-items:center;gap:10px;}
.jt-l{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--y);letter-spacing:2px;}
.jbody{flex:1;overflow-y:auto;padding:20px 24px;}
.js{margin-bottom:22px;}
.jsh{font-family:'Press Start 2P',monospace;font-size:7px;color:#555;margin-bottom:10px;letter-spacing:2px;}
.ecard{border:1px solid #1a1a1a;padding:12px 14px;margin-bottom:6px;background:#05050e;}
.ecard.g{border-color:#0d3318;}.ecard.b{border-color:#3a0d0d;}.ecard.n{border-color:#3a3400;}
.ec-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ecdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.ecdot.g{background:var(--g);}.ecdot.b{background:var(--r);}.ecdot.n{background:var(--y);}
.ec-n{font-family:'Press Start 2P',monospace;font-size:7px;color:#888;letter-spacing:1px;}
.ec-p{font-size:10px;color:#444;margin-left:auto;}
.ec-inp{background:transparent;border:none;border-top:1px solid #1a1a1a;color:#aaa;font-family:'Courier Prime',monospace;font-size:12px;width:100%;resize:none;outline:none;min-height:34px;padding-top:7px;line-height:1.6;}
.ec-inp::placeholder{color:#2a2a2a;}
.unk{font-size:11px;color:#2a2a2a;font-style:italic;border:1px solid #0d0d0d;padding:8px 12px;margin-bottom:4px;}

/* SEARCH */
#searchbar{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#060612;border:1px solid var(--highlight);padding:16px 20px;z-index:9990;width:360px;box-shadow:0 0 30px rgba(136,119,255,.2);}
.sb-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--b);margin-bottom:10px;letter-spacing:2px;}
#sb-input{background:#000;border:1px solid #333;color:#eee;font-family:'Courier Prime',monospace;font-size:13px;padding:7px 11px;width:100%;outline:none;}
#sb-input:focus{border-color:var(--highlight);}
#sb-results{margin-top:10px;max-height:220px;overflow-y:auto;}
.sb-item{padding:8px 10px;border:1px solid transparent;cursor:pointer;font-size:12px;color:#888;}
.sb-item:hover{background:#0a0020;border-color:var(--highlight);color:var(--y);}
.sb-pg{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--b);margin-right:10px;}
mark{background:none;color:var(--y);}

/* TOAST */
#toast{position:fixed;bottom:14px;right:14px;background:#001a0a;border:1px solid var(--g);padding:10px 14px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--g);max-width:240px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9998;letter-spacing:1px;line-height:2;}
#toast.show{opacity:1;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#2a2a3a;}::-webkit-scrollbar-thumb:hover{background:#4a4a5a;}

/* ── LIGHT MODE ── */
body.light{background:#f3f1e8;color:#1c1c1c;}
body.light html,body.light{background:#f3f1e8;}
body.light::after{background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);}
body.light #intro,body.light #boot,body.light #library{background:#f3f1e8;}
body.light .lib-bar,body.light .topbar,body.light .jt{background:#fff;}
body.light .lib-count{color:#888;}
body.light .lib-add{color:#555;border-color:#ccc;}
body.light .lib-add:hover{color:#0a6b30;border-color:#0a6b30;}
body.light .cart-card{background:#fff;border-color:#ddd;}
body.light .cart-card:hover{border-color:#8877ff;box-shadow:0 8px 20px rgba(85,68,187,.15);}
body.light .cc-cover{background:#ece9dd;}
body.light .cc-cover-fallback,body.light .det-cover-fallback,body.light .add-ico{color:#d8d4c2;}
body.light .cc-title{color:#333;}
body.light .cc-author,body.light .cc-pct{color:#777;}
body.light .cc-pbar{background:#e2ded0;}
body.light .cart-card.add-card{border-color:#ccc;}
body.light .add-lbl{color:#999;}
body.light #detail{background:rgba(0,0,0,.45);}
body.light .det-box{background:#fff;border-color:#8877ff;}
body.light .det-cover{background:#ece9dd;}
body.light .det-author{color:#3366cc;}
body.light .det-pub,body.light .det-sl,body.light .det-desc{color:#666;}
body.light .det-tag{border-color:#ccc;color:#666;}
body.light .det-stat{background:#f3f1e8;border-color:#ddd;}
body.light .det-sv{color:#222;}
body.light .det-desc{border-top-color:#e5e2d5;}
body.light .det-actions{border-top-color:#e5e2d5;}
body.light .det-play{background:#fff;}
body.light .det-del,body.light .det-close{border-color:#ccc;color:#888;}
body.light .tbadge{color:#999;border-color:#ccc;}
body.light .tbook{color:#3366cc;}
body.light .tbtn{color:#555;border-color:#ccc;}
body.light .tbtn:hover{color:#a08a00;border-color:#a08a00;}
body.light .lp,body.light .rp{background:#fdfcf6;border-color:#e5e2d5;}
body.light .ph{color:#888;border-bottom-color:#eee;}
body.light .sv:hover{background:#f3f1e8;border-color:#ccc;}

<script>
// ══════════════════════════════════════════════════════
//  PIXEL ART INTRO  — v3 cinematic rewrite
//  Canvas 640×360 (16:9). Each logical "pixel" = 4×4.
//  Sprite grid is 160×90 logical pixels.
//  Characters are 20–32lp tall for legible detail.
// ══════════════════════════════════════════════════════
(function(){
  const IC=document.getElementById('ic');
  const ctx=IC.getContext('2d');
  const W=640,H=360; // 16:9
  IC.width=W;IC.height=H;
  ctx.imageSmoothingEnabled=false;

  function resize(){
    const s=Math.min(window.innerWidth/W,(window.innerHeight)/H,2.5);
    IC.style.width=Math.floor(W*s)+'px';IC.style.height=Math.floor(H*s)+'px';
  }
  resize();window.addEventListener('resize',resize);

  // ── PALETTE ──────────────────────────────────────────
  const C={
    black:'#000000', dk:'#080810', bg0:'#050510', bg1:'#0c0c1e',
    white:'#ffffff', cream:'#f4e8c8', ltgrey:'#8899aa', grey:'#556677', dkgrey:'#1e2233',
    yellow:'#f0d000', gold:'#c8a800', amber:'#e07000',
    blue:'#2255cc', ltblue:'#5599ff', skyblue:'#6699cc', cyan:'#22ccee',
    green:'#22aa44', ltgreen:'#55dd66', dkgreen:'#0d5522',
    red:'#cc2222', ltred:'#ff5544', dkred:'#661111',
    purple:'#7733bb', ltpurple:'#aa66ee', dkpurple:'#330055',
    orange:'#dd6600',
    skin:'#f2c07a', skindark:'#c88840', skinlit:'#fde8b0', skinshad:'#aa6633',
    hairbrown:'#4a2800', hairdark:'#2a1400', hairlt:'#7a4820',
    wooddk:'#5a3010', wood:'#8b5e30', woodlt:'#c07840',
    walldk:'#181820', wall:'#252535', walllt:'#363648', wallhi:'#4a4a60',
    wallbrick:'#2e2e40', wallbrickhi:'#3e3e52',
    winblue:'#4488cc', winlit:'#88ccff', winwarm:'#ffcc66', winwarmdk:'#cc8822',
    pkg:'#9b6c35', pkglt:'#c49050', pkgdk:'#6b4215',
    page:'#f0ecd8', pagedk:'#ccc4a0', pageshadow:'#a09870',
    devbg:'#050514', devlit:'#141440',
    lamp:'#ffdd44', lampglow:'#ffaa00',
    curtain:'#2a0844', curtainlt:'#441166', curtainshadow:'#180530',
    starglow:'#cce8ff', starglow2:'#ffffcc',
    grounddk:'#111118', groundmid:'#1a1a28', groundhi:'#242436',
    rooftile:'#1a1a2e', roofhi:'#2e2e44',
    chimneydk:'#0e0e18', smoke:'#555566',
    gravel:'#2a2a3a', gravelhi:'#3a3a4e',
    neon_r:'#ff2244', neon_g:'#22ff88', neon_b:'#4488ff',
    neon_p:'#cc22ff', neon_y:'#ffee00',
    couch:'#7722aa', couchlt:'#9944cc', couchdk:'#551188',
    rug:'#331166', ruglt:'#553388',
    pcb:'#0a3a1a', pcblt:'#1a5a2a', trace:'#22ff88',
    solder:'#ccddcc', chip:'#111111', chippin:'#888866',
  };

  // ── PIXEL SIZE ────────────────────────────────────────
  const P=4;
  function f(lx,ly,lw,lh,col){ ctx.fillStyle=col; ctx.fillRect(lx*P,ly*P,lw*P,lh*P); }
  function rr(x,y,w,h,col){ ctx.fillStyle=col; ctx.fillRect(x,y,w,h); }
  function lp(lx,ly,col){ f(lx,ly,1,1,col); }

  // ── TEXT ─────────────────────────────────────────────
  function txt(s,x,y,col,size=8,align='left'){
    ctx.save();ctx.fillStyle=col;ctx.font=`bold ${size}px "Courier New",monospace`;
    ctx.textAlign=align;ctx.textBaseline='top';ctx.fillText(s,x,y);ctx.restore();
  }
  function txtC(s,y,col,size=8){ txt(s,W/2,y,col,size,'center'); }

  // ── SHADOW TEXT ───────────────────────────────────────
  function txtShadow(s,x,y,col,shadow,size=8,align='center',blur=8){
    ctx.save();
    ctx.shadowColor=shadow;ctx.shadowBlur=blur;
    ctx.fillStyle=col;ctx.font=`bold ${size}px "Courier New",monospace`;
    ctx.textAlign=align;ctx.textBaseline='top';ctx.fillText(s,x,y);
    ctx.shadowBlur=0;ctx.restore();
  }

  // ── DIALOGUE BOX ─────────────────────────────────────
  function dBox(lines,name){
    // Slim translucent banner pinned to the very bottom edge so the
    // scene art (ground, characters, props) stays fully visible above it.
    const lineH=17;
    const bh=Math.max(34,lines.length*lineH+16);
    const yb=H-bh-6;
    const bx=14,bw=W-28;

    // Soft gradient fade behind the text instead of an opaque panel
    const fadeH=Math.min(70,bh+34);
    const g=ctx.createLinearGradient(0,H-fadeH,0,H);
    g.addColorStop(0,'rgba(2,2,8,0)');
    g.addColorStop(1,'rgba(2,2,10,0.88)');
    ctx.fillStyle=g;ctx.fillRect(0,H-fadeH,W,fadeH);

    // Thin accent rule above the text block
    rr(bx,yb-2,bw,1,'rgba(240,208,0,0.5)');

    if(name){
      const nw=name.length*7+14;
      rr(bx,yb-19,nw,15,'rgba(4,4,10,0.85)');
      ctx.strokeStyle=C.yellow;ctx.lineWidth=1;ctx.strokeRect(bx,yb-19,nw,15);
      txt(name,bx+6,yb-17,C.yellow,8);
    }
    lines.forEach((l,i)=>txt(l,bx+2,yb+i*lineH,C.cream,9));
  }

  // ── STARS ─────────────────────────────────────────────
  const STARS=Array.from({length:80},(_,i)=>({
    x:((i*137+31)%W), y:((i*79+7)%(H*0.7|0)),
    b: (i%4===0)?2.5:(i%5===0)?2:1.5,
    sp: 0.4+((i*13)%10)*0.06,
    col: i%7===0?C.starglow2:C.starglow
  }));
  function drawStars(t){
    STARS.forEach(s=>{
      const twink=Math.sin(t*s.sp+s.x*0.02)*0.5+0.5;
      ctx.globalAlpha=0.25+twink*0.75;
      rr(s.x,s.y,s.b,s.b,s.col);
    });
    ctx.globalAlpha=1;
  }

  // ── MOON ─────────────────────────────────────────────
  function drawMoon(cx,cy,r){
    ctx.save();
    const gr=ctx.createRadialGradient(cx,cy,0,cx,cy,r*4);
    gr.addColorStop(0,'rgba(200,230,255,0.15)');gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy,r*4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#dde8ff';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#b8c8ee';
    ctx.beginPath();ctx.arc(cx-r*0.3,cy-r*0.2,r*0.18,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.2,cy+r*0.3,r*0.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+r*0.35,cy-r*0.35,r*0.08,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ── NIGHT SKY ─────────────────────────────────────────
  function nightSky(t,moonX=520,moonY=55){
    const g=ctx.createLinearGradient(0,0,0,H*0.62);
    g.addColorStop(0,'#000008');g.addColorStop(0.4,'#04041a');g.addColorStop(1,'#0a0a22');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H*0.62);
    drawStars(t);
    drawMoon(moonX,moonY,18);
  }

  // ── GROUND / ROAD ─────────────────────────────────────
  function drawGround(y,h){
    f(0,y,160,h,C.grounddk);
    f(0,y,160,1,C.groundmid);
    for(let i=0;i<10;i++) f(i*16+4,y+2,8,1,C.groundmid);
  }

  // ═══════════════════════════════════════════════════════
  //  SPRITES (logical pixels, P=4, so 1lp = 4px)
  // ═══════════════════════════════════════════════════════

  // ── VICTOR — tall villain with lab coat ───────────────
  function drawVictor(lx,ly,mood='neutral',anim=0){
    const bob=0;
    const walk=Math.sin(anim*0.12)*1|0;

    f(lx+1,ly-3,5,3,C.black);   f(lx+8,ly-3,5,3,C.black);
    f(lx,ly-3,2,2,C.dkgrey);    f(lx+12,ly-3,2,2,C.dkgrey);

    f(lx+2,ly-13,4,11,C.walldk); f(lx+8,ly-13,4,11,C.walldk);
    f(lx+3,ly-13,2,11,C.dkgrey); f(lx+9,ly-13,2,11,C.dkgrey);

    f(lx+1,ly-14,12,2,C.dkgrey);
    f(lx+6,ly-14,2,2,C.grey);

    f(lx,ly-28,14,15,C.ltgrey);
    f(lx,ly-28,2,15,C.grey);
    f(lx+12,ly-28,2,15,C.grey);
    f(lx+3,ly-28,4,12,C.walldk);
    f(lx+7,ly-28,4,12,C.walldk);
    f(lx+4,ly-28,6,14,C.dkgrey);
    f(lx+5,ly-26,4,1,C.walldk); f(lx+5,ly-23,4,1,C.walldk); f(lx+5,ly-20,4,1,C.walldk);
    f(lx+2,ly-29,4,3,C.ltgrey); f(lx+8,ly-29,4,3,C.ltgrey);
    f(lx+3,ly-30,3,2,C.ltgrey); f(lx+8,ly-30,3,2,C.ltgrey);

    const la=Math.sin(anim*0.12)*1.5|0;
    f(lx-3,ly-27+la,4,13,C.ltgrey);
    f(lx+13,ly-27-la,4,13,C.ltgrey);
    f(lx-3,ly-28+la,4,2,C.grey);
    f(lx+13,ly-28-la,4,2,C.grey);

    f(lx-3,ly-15+la,4,4,C.skin);
    f(lx+13,ly-15-la,4,4,C.skin);
    f(lx-2,ly-14+la,2,2,C.skindark);
    f(lx+14,ly-14-la,2,2,C.skindark);

    f(lx+4,ly-31,6,4,C.skin);
    f(lx+4,ly-31,1,4,C.skindark); f(lx+9,ly-31,1,4,C.skindark);

    f(lx+2,ly-43,10,12,C.skin);
    f(lx+2,ly-43,2,12,C.skindark);
    f(lx+10,ly-43,2,12,C.skindark);

    f(lx+1,ly-41,2,4,C.skin);  f(lx+11,ly-41,2,4,C.skin);
    f(lx+1,ly-40,1,2,C.skindark); f(lx+12,ly-40,1,2,C.skindark);

    f(lx+2,ly-43,10,4,C.hairdark);
    f(lx+3,ly-43,8,2,C.hairbrown);
    f(lx+5,ly-44,4,2,C.hairbrown);
    f(lx+6,ly-45,2,2,C.hairdark);

    f(lx+3,ly-39,4,4,C.dkgrey);
    f(lx+7,ly-39,4,4,C.dkgrey);
    f(lx+6,ly-38,1,2,C.black);
    f(lx+4,ly-38,2,2,C.blue);
    f(lx+8,ly-38,2,2,C.blue);
    f(lx+4,ly-38,1,1,C.ltblue);
    f(lx+8,ly-38,1,1,C.ltblue);
    f(lx+2,ly-38,1,2,C.dkgrey);
    f(lx+11,ly-38,1,2,C.dkgrey);

    f(lx+6,ly-36,2,3,C.skindark);
    f(lx+7,ly-34,2,1,C.skinshad);

    f(lx+3,ly-36,1,2,C.skinshad);
    f(lx+10,ly-36,1,2,C.skinshad);

    if(mood==='evil'){
      f(lx+3,ly-33,8,1,C.dkred);
      f(lx+3,ly-32,2,1,C.dkred);  f(lx+9,ly-32,2,1,C.dkred);
      f(lx+4,ly-32,1,1,C.skinshad); f(lx+8,ly-32,1,1,C.skinshad);
    } else if(mood==='laugh'){
      f(lx+3,ly-33,8,2,C.black);
      f(lx+4,ly-33,6,1,C.white);
      f(lx+4,ly-32,6,1,C.dkgrey);
      f(lx+4,ly-31,1,1,C.skinshad);f(lx+9,ly-31,1,1,C.skinshad);
    } else {
      f(lx+4,ly-33,6,1,C.skindark);
    }

    f(lx+9,ly-37,2,1,C.skinshad);
    f(lx+10,ly-36,1,2,C.skinshad);
  }

  // ── MAX — teen hero, round face, hoodie ───────────────
  function drawMax(lx,ly,mood='curious',anim=0){
    const bob=Math.sin(anim*0.18)*0.7|0;
    const walk=Math.sin(anim*0.18)*1|0;

    f(lx+1,ly-3,5,3,C.white); f(lx+8,ly-3,5,3,C.white);
    f(lx,ly-4,7,2,C.ltgrey);  f(lx+7,ly-4,7,2,C.ltgrey);

  const BKCOLS=[C.red,C.blue,C.ltgreen,C.orange,C.purple,C.cyan,C.gold,C.ltred,C.ltblue,C.green];
  function drawShelf(lx,ly,shelves=3,booksPerShelf=9){
    f(lx,ly,booksPerShelf*3+4,shelves*10+4,C.wooddk);
    f(lx,ly,2,shelves*10+4,C.wood);
    f(lx+booksPerShelf*3+2,ly,2,shelves*10+4,C.wood);
    for(let s=0;s<shelves;s++){
      f(lx,ly+s*10+8,booksPerShelf*3+4,2,C.woodlt);
      f(lx,ly+s*10+9,booksPerShelf*3+4,1,C.wooddk);
      for(let b=0;b<booksPerShelf;b++){
        const bc=BKCOLS[(s*booksPerShelf+b)%BKCOLS.length];
        const bh=5+((s*3+b*7)%4);
        const bw=2;
        f(lx+2+b*3,ly+s*10+(8-bh),bw,bh,bc);
        f(lx+2+b*3,ly+s*10+(8-bh),1,bh,'rgba(255,255,255,0.2)');
        f(lx+2+b*3,ly+s*10+(8-bh),bw,1,C.cream);
        f(lx+2+b*3+bw,ly+s*10+(8-bh),1,bh,C.wooddk);
      }
    }
    f(lx,ly,booksPerShelf*3+4,2,C.woodlt);
  }

  // ── MONITOR / COMPUTER ───────────────────────────────
  function drawComputer(lx,ly,screenContent='off',t=0){
    ctx.globalAlpha=0.4;
    f(lx+2,ly+2,28,20,C.black);
    ctx.globalAlpha=1;
    f(lx,ly,28,20,C.dkgrey);
    f(lx+1,ly+1,26,16,C.black);
    if(screenContent==='off'){
      f(lx+2,ly+2,24,14,C.black);
    } else if(screenContent==='glow'){
      f(lx+2,ly+2,24,14,C.devbg);
      // Scanlines for CRT texture
      for(let sl=0;sl<14;sl+=2) f(lx+2,ly+2+sl,24,1,'rgba(0,20,0,0.4)');
      // Terminal text — short broken segments per line so it reads as code,
      // not solid stripes. Each line is several short word-like chunks.
      const codeRows=[
        [[1,3,C.ltgreen],[5,2,C.grey],[8,4,C.ltgreen]],
        [[1,2,C.grey],[4,5,C.cyan],[10,2,C.grey]],
        [[1,6,C.ltgreen],[8,3,C.grey]],
        [[1,2,C.grey],[4,2,C.grey],[7,6,C.ltgreen]],
        [[1,4,C.cyan],[6,4,C.grey]],
      ];
      codeRows.forEach((row,i)=>{
        row.forEach(([cx,cw,cc])=>f(lx+2+cx,ly+3+i*2,cw,1,cc));
      });
      // Blinking cursor at the prompt line
      if(t%40<20) f(lx+3,ly+14,2,1,C.ltgreen);
      f(lx+2,ly+14,1,1,C.ltgreen);
    } else if(screenContent==='booksole'){
      f(lx+2,ly+2,24,14,C.devbg);
      // BOOKSOLE wordmark, blocky
      f(lx+4,ly+5,20,2,C.yellow);
      f(lx+4,ly+6,20,1,C.gold);
      // Broken code-style lines beneath, not solid bars
      [[1,5,C.ltgreen],[7,3,C.grey],[11,4,C.ltblue]].forEach(([cx,cw,cc])=>f(lx+2+cx,ly+9,cw,1,cc));
      [[1,3,C.grey],[5,6,C.ltblue]].forEach(([cx,cw,cc])=>f(lx+2+cx,ly+11,cw,1,cc));
      if(t%30<15) f(lx+3,ly+13,3,1,C.ltblue);
      const scan=(t*2)%14;
      ctx.globalAlpha=0.1;
      f(lx+2,ly+2+scan,24,2,C.white);
      ctx.globalAlpha=1;
    }
    f(lx+11,ly+18,6,1,C.grey);
    f(lx+10,ly+17,8,1,C.black);
    f(lx+11,ly+20,6,4,C.dkgrey);
    f(lx+7,ly+24,14,2,C.grey);
    f(lx+7,ly+25,14,1,C.dkgrey);
    const on=screenContent!=='off';
    f(lx+25,ly+1,2,2,on?C.ltgreen:C.dkgrey);
  }

  function drawLamp(lx,ly,on=true,t=0){

  // ── BOOK MONSTER ─────────────────────────────────────
  function drawBookMonster(lx,ly,t){
    const fl=Math.sin(t*0.10)*1.5|0;
    const angry=Math.sin(t*0.08)>0.3;

    f(lx,ly+fl,12,16,C.page);
    f(lx+14,ly+fl,12,16,C.page);
    f(lx+11,ly-2+fl,4,20,C.pageshadow);
    f(lx+12,ly-1+fl,2,19,C.pagedk);

    for(let row=0;row<6;row++){
      f(lx+1,ly+3+row*2+fl,10,1,C.pagedk);
      f(lx+15,ly+3+row*2+fl,10,1,C.pagedk);
    }
    f(lx,ly+14+fl,3,2,C.pageshadow);
    f(lx+23,ly+14+fl,3,2,C.pageshadow);

    f(lx+1,ly+3+fl,5,4,C.black);
    f(lx+2,ly+4+fl,3,2,C.dkred);
    f(lx+3,ly+4+fl,2,2,C.red);
    f(lx+15,ly+3+fl,5,4,C.black);
    f(lx+16,ly+4+fl,3,2,C.dkred);
    f(lx+17,ly+4+fl,2,2,C.red);
    f(lx+2,ly+4+fl,1,1,C.white);
    f(lx+16,ly+4+fl,1,1,C.white);

    f(lx+11,ly+4+fl,4,3,C.pageshadow);

    const mo=angry?8:10;
    f(lx+2,ly+mo+fl,22,3,C.black);
    [0,3,6,9,12,15,18].forEach(i=>f(lx+2+i,ly+mo+fl,2,2,C.white));
    [1,4,7,10,13,16].forEach(i=>f(lx+3+i,ly+mo+2+fl,2,2,C.cream));
    f(lx+2,ly+mo+fl,22,1,C.dkred);

    const tw=Math.sin(t*0.08+1)*2|0;
    f(lx-6,ly+7+fl+tw,6,3,C.pagedk);
    f(lx-8,ly+9+fl+tw,3,4,C.pageshadow);
    f(lx+26,ly+7+fl-tw,6,3,C.pagedk);
    f(lx+27,ly+9+fl-tw,3,4,C.pageshadow);
    f(lx-9,ly+8+fl+tw,2,1,C.dkgrey);
    f(lx-9,ly+10+fl+tw,2,1,C.dkgrey);
    f(lx+29,ly+8+fl-tw,2,1,C.dkgrey);
    f(lx+29,ly+10+fl-tw,2,1,C.dkgrey);

    ctx.globalAlpha=0.15;
    f(lx+2,ly+18+fl,22,2,C.black);
    ctx.globalAlpha=1;
  }

  // ── DUMMY — living ventriloquist puppet ──────────────
  // Wooden joints, painted grin, origin = feet at (lx,ly)
  function drawDummy(lx,ly,t){
    const tilt=Math.sin(t*0.05)*1|0;
    const jaw=Math.sin(t*0.3)>0.2?2:0; // jaw clacks open

    // Shoes — painted wood
    f(lx,ly-3,5,3,C.black); f(lx+7,ly-3,5,3,C.black);
    // Legs — jointed, wood-grain
    f(lx+1,ly-13,4,10,C.wooddk); f(lx+7,ly-13,4,10,C.wooddk);
    f(lx+2,ly-13,2,10,C.wood);   f(lx+8,ly-13,2,10,C.wood);
    f(lx+2,ly-8,3,1,C.black);    f(lx+8,ly-8,3,1,C.black); // knee joint line
    // Suit jacket — little tuxedo
    f(lx,ly-24,12,11,C.dkgrey);
    f(lx+1,ly-24,2,11,C.walldk); f(lx+9,ly-24,2,11,C.walldk);
    f(lx+4,ly-24,4,11,C.white);  // shirt front
    f(lx+5,ly-22,2,2,C.red);     // bow tie
    // Arms — jointed wood, dangling
    const aSwing=Math.sin(t*0.08)*2|0;
    f(lx-3,ly-23+aSwing,3,11,C.dkgrey);
    f(lx+12,ly-23-aSwing,3,11,C.dkgrey);
    f(lx-3,ly-13+aSwing,3,3,C.wood); // wooden hand L
    f(lx+12,ly-13-aSwing,3,3,C.wood); // wooden hand R
    f(lx-2,ly-12+aSwing,1,1,C.wooddk);
    f(lx+13,ly-12-aSwing,1,1,C.wooddk);
    // Neck joint
    f(lx+4,ly-27+tilt,4,3,C.skin);
    f(lx+4,ly-27+tilt,4,1,C.black); // joint seam
    // Head — painted wood, oversized
    f(lx+1+tilt,ly-39+tilt,10,12,C.skinlit);
    f(lx+1+tilt,ly-39+tilt,1,12,C.skindark);
    f(lx+10+tilt,ly-39+tilt,1,12,C.skindark);
    // Painted hair — slick side part
    f(lx+1+tilt,ly-39+tilt,10,3,C.hairdark);
    f(lx+2+tilt,ly-39+tilt,2,1,C.black); // part line
    // Rosy painted cheeks
    f(lx+2+tilt,ly-32+tilt,2,2,C.red);
    f(lx+8+tilt,ly-32+tilt,2,2,C.red);
    // Wide painted-on eyes — always open, glassy
    f(lx+2+tilt,ly-34+tilt,3,3,C.white); f(lx+7+tilt,ly-34+tilt,3,3,C.white);
    f(lx+3+tilt,ly-34+tilt,2,2,C.black); f(lx+8+tilt,ly-34+tilt,2,2,C.black);
    f(lx+3+tilt,ly-34+tilt,1,1,C.white); f(lx+8+tilt,ly-34+tilt,1,1,C.white); // glassy glint
    // Hinged jaw — clacks open showing the seam
    f(lx+2+tilt,ly-30+tilt,7,2+jaw,C.black);
    f(lx+3+tilt,ly-30+tilt,5,1,C.dkred); // painted grin line
    if(jaw){ f(lx+3+tilt,ly-29+tilt+jaw,5,1,C.white); } // teeth flash when jaw drops
    // Crack down the cheek (creepy detail)
    f(lx+7+tilt,ly-37+tilt,1,4,C.skindark);
  }

  // ── HAUNTED MASK — floating carved mask, glowing eyes ─
  // origin: centre point (lx,ly)
  function drawHauntedMask(lx,ly,t){
    const fl=Math.sin(t*0.09)*2|0;
    const pulse=Math.sin(t*0.15)*0.5+0.5;
    // Glow halo
    ctx.save();
    ctx.shadowColor=C.ltred;ctx.shadowBlur=10+pulse*6;
    // Mask face — carved, leathery green-grey
    f(lx,ly+fl,14,16,C.dkgreen);
    f(lx+1,ly+1+fl,12,14,C.green);
    // Jagged carved edges
    [0,3,6,9,12].forEach(i=>f(lx+i,ly+fl,2,1,C.dkgreen));
    [0,3,6,9,12].forEach(i=>f(lx+i,ly+15+fl,2,1,C.dkgreen));
    // Forehead ridges
    f(lx+2,ly+3+fl,10,1,C.dkgreen);

    f(0,72,160,18,C.bg0);

    for(let j=72;j<90;j+=4) f(0,j,160,1,C.devlit);

      f(lx,0,12,4,C.cyan);
      ctx.globalAlpha=1;

    // Perspective lines converge on a distant point near the top of the
    // corridor — high enough that they read as architecture, not a
    // crosshair pointed at the characters standing in the foreground
    ctx.save();ctx.strokeStyle=C.ltblue;ctx.lineWidth=1;ctx.globalAlpha=0.08;

      ctx.beginPath();ctx.moveTo(bx*P,(72)*P);ctx.lineTo((80)*P,(2)*P);ctx.stroke();

  const SCENES=[
    {fn:sc0,dur:160,clicks:1},
    {fn:sc1,dur:400,clicks:3},
    {fn:sc2,dur:360,clicks:3},
    {fn:sc3,dur:320,clicks:3},
    {fn:sc4,dur:400,clicks:4},
    {fn:sc5,dur:340,clicks:4},
    {fn:sc6,dur:460,clicks:2},
  ];
  let si=0,st=0,cc=0,done=false;
  function nextScene(){si++;if(si>=SCENES.length){done=true;endIntro();}else{st=0;cc=0;}}
  function endIntro(){
    document.getElementById('intro').style.display='none';
    document.getElementById('boot').style.display='flex';
    bootStart();
  }
  IC.addEventListener('click',()=>{
    if(done)return;
    const sc=SCENES[si];cc++;
    if(cc>=sc.clicks||st>=sc.dur-10)nextScene();
    else st=Math.min(st+(sc.dur/sc.clicks|0),sc.dur-1);
  });
  document.getElementById('intro-skip').onclick=()=>{done=true;endIntro();};
  let raf;
  function loop(){
    if(done){cancelAnimationFrame(raf);return;}
    st++;
    const sc=SCENES[si];
    const tw=Math.min(10,st/(sc.dur/12));
    sc.fn(st,tw);
    if(st>=sc.dur)nextScene();
    raf=requestAnimationFrame(loop);
  }
  loop();
})();

function bootStart(){
  const MSGS=['BOOKSOLE SYSTEM v0.6','LOADING LIBRARY INDEX...','MOUNTING CARTRIDGE SLOT...','ACHIEVEMENT ENGINE READY...','SAVE SYSTEM ONLINE...','PRESS START'];
  let pct=0,mi=0;
  function tick(){
    if(pct>=100){
      const m=document.getElementById('bmsg');
      m.textContent='PRESS ANYWHERE TO CONTINUE';m.classList.add('boot-blink');return;
    }
    pct+=Math.random()*8+2;if(pct>100)pct=100;
    document.getElementById('bbar').style.width=pct+'%';
    const ni=Math.min(Math.floor(pct/22),MSGS.length-2);
    if(ni>mi){mi=ni;document.getElementById('bmsg').textContent=MSGS[mi];}
    setTimeout(tick,60+Math.random()*90);
  }
  tick();
  document.getElementById('boot').addEventListener('click',()=>{
    if(pct>=100){show('library');renderLibrary();}
  },{once:false});
}

function libLoad(){try{return JSON.parse(localStorage.getItem('bs5_lib')||'[]');}catch(e){return[];}}
function libSave(lib){try{localStorage.setItem('bs5_lib',JSON.stringify(lib));}catch(e){}}
function saveBookData(id,data){try{localStorage.setItem('bs5_bd_'+id,JSON.stringify(data));}catch(e){toast('STORAGE FULL — EXPORT SAVES');}}
function loadBookData(id){try{const d=localStorage.getItem('bs5_bd_'+id);return d?JSON.parse(d):null;}catch(e){return null;}}
function deleteBookData(id){try{localStorage.removeItem('bs5_bd_'+id);localStorage.removeItem('bs5_pg_'+id);}catch(e){}}

let book=null,bookId=null,saves=[],active=0,found={},notes={},unlocked=new Set(),stats={c:0,p:0,r:0,e:0};
let fontSize=13,library=[],detailBookId=null;

function cur(){return saves[active];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function persist(){
  if(!bookId)return;
  saveBookData(bookId,{saves,found,notes,unlocked:[...unlocked],stats,fontSize});
  syncLibMeta();
}
function loadSession(){
  if(!bookId)return;
  const d=loadBookData(bookId);
  if(d){saves=d.saves||[];found=d.found||{};notes=d.notes||{};unlocked=new Set(d.unlocked||[]);stats=d.stats||{c:0,p:0,r:0,e:0};fontSize=d.fontSize||13;}
  else{saves=[];found={};notes={};unlocked=new Set();stats={c:0,p:0,r:0,e:0};fontSize=13;}

    {id:'three',n:'COLLECTOR',d:'Find 3 different endings',check:()=>Object.keys(found).length>=3},
    {id:'all',n:'COMPLETIONIST',d:`Find all ${ends.length} endings`,check:()=>Object.keys(found).length>=ends.length},
    {id:'good',n:'HAPPY PLACE',d:'Reach a good ending',check:()=>Object.values(found).some(t=>t==='good')},
    {id:'allbad',n:'PAIN SEEKER',d:`Find all ${bad.length} bad ends`,check:()=>Object.entries(found).filter(([,t])=>t==='bad').length>=bad.length},
    {id:'speed',n:'SPEEDRUNNER',d:'End in 3 choices or fewer',check:()=>saves.some(s=>s.isEnding&&s.choices<=3)},
    {id:'5r',n:'OBSESSED',d:'Complete 5 playthroughs',check:()=>stats.r>=5},

// ── EPUB PARSER ──
async function parseEpub(file){
  const zip=await JSZip.loadAsync(await file.arrayBuffer());
  const opfKey=Object.keys(zip.files).find(k=>k.endsWith('.opf'));
  if(!opfKey)throw new Error('No OPF found');
  const opfDoc=new DOMParser().parseFromString(await zip.files[opfKey].async('text'),'application/xml');
  const base=opfKey.includes('/')?opfKey.slice(0,opfKey.lastIndexOf('/')+1):'';
  const mf={};opfDoc.querySelectorAll('manifest item').forEach(it=>mf[it.getAttribute('id')]={href:base+it.getAttribute('href'),type:it.getAttribute('media-type')||''});
  const spine=[];opfDoc.querySelectorAll('spine itemref').forEach(r=>spine.push(r.getAttribute('idref')));
  const getM=tag=>{const el=opfDoc.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/',tag)[0]||opfDoc.querySelector(tag);return el?el.textContent.trim():'';};
  const title=getM('title'),author=getM('creator'),publisher=getM('publisher'),year=getM('date').slice(0,4);
  let desc=getM('description');if(desc)desc=new DOMParser().parseFromString(desc,'text/html').body.textContent.trim();
  let series='';
  if(title.toLowerCase().includes('give yourself goosebumps')||file.name.toLowerCase().includes('give_yourself'))series='Give Yourself Goosebumps';
  else if(title.toLowerCase().includes('goosebumps'))series='Classic Goosebumps';
  // Cover
  let coverDataUrl='';
  const covMeta=opfDoc.querySelector('meta[name="cover"]');
  const covId=covMeta?covMeta.getAttribute('content'):'';
  const covItem=(covId&&mf[covId])||Object.values(mf).find(v=>v.href.toLowerCase().includes('cover')&&v.type.startsWith('image/'));
  if(covItem){try{const e=zip.files[covItem.href]||zip.files[covItem.href.replace(/^\//,'')];if(e){const ab=await e.async('arraybuffer');const b64=btoa(String.fromCharCode(...new Uint8Array(ab)));coverDataUrl=`data:${covItem.type};base64,${b64}`;log('cover loaded','ok');}}catch(e){log('cover failed','warn');}}
  log('spine: '+spine.length,'ok');
  const htp={};for(const id of spine){const item=mf[id];if(!item)continue;const bn=item.href.split('/').pop();const pm=bn.match(/ch(\d+)\.(?:html?|xhtml?)$/i);if(pm)htp[bn]=String(parseInt(pm[1],10));}
  const pages={};let parsed=0;
  for(const id of spine){
    const item=mf[id];if(!item)continue;
    const bn=item.href.split('/').pop();const pageId=htp[bn];if(!pageId)continue;
    const entry=zip.files[item.href]||zip.files[item.href.replace(/^\//,'')];if(!entry)continue;
    const chDoc=new DOMParser().parseFromString(await entry.async('text'),'text/html');
    const choices=[];const seen=new Set();
    chDoc.querySelectorAll('a[href]').forEach(a=>{const tm=a.textContent.match(/PAGE\s+(\d+)/i);if(!tm)return;const target=tm[1];if(seen.has(target))return;seen.add(target);const para=a.closest('p');const label=para?para.textContent.replace(/[,.]?\s*(?:go on to|turn to|go to)\s+PAGE\s+\d+\.?/gi,'').replace(/\s+/g,' ').trim().slice(0,120):'Go to page '+target;choices.push({text:label||'Go to page '+target,target});});
    chDoc.querySelectorAll('a[href]').forEach(a=>{const p=a.closest('p');if(p)p.remove();});
    chDoc.querySelectorAll('.chapterHead,.centerImage,.centerImage0,.centerImage00,.centerImage3,img').forEach(el=>el.remove());
    const raw=chDoc.body.textContent.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>!l.match(/^Classic Goosebumps|^Give Yourself Goosebumps/i)).join('\n').replace(/\n{3,}/g,'\n\n').trim();
    const isEnding=choices.length===0;
    const et=isEnding?(()=>{const l=raw.toLowerCase();return['congratulations','saved','hero','victory','escaped','survived'].some(w=>l.includes(w))?'good':['game over','you are dead','trapped','doom','forever'].some(w=>l.includes(w))?'bad':'neutral';})():null;
    pages[pageId]={text:raw,choices,isEnding,endingType:et};parsed++;
  }
  const endingCount=Object.values(pages).filter(p=>p.isEnding).length;
  log(parsed+' pages · '+endingCount+' endings','ok');
  const startPage=String(Object.keys(pages).map(Number).sort((a,b)=>a-b)[0]);
  return{bookData:{title,pages,startPage},meta:{id:'',title,author,publisher,year,description:desc,series,totalPages:parsed,totalEndings:endingCount,coverDataUrl,totalRuns:0,foundEndings:0,totalChoices:0}};
}

function parseTxt(text,title){
  const clean=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const ms=[...clean.matchAll(/(?:^|\n)[ \t]*(\d{1,3})[ \t]*\n/gm)];
  if(ms.length<3)return null;
  const pages={};
  for(let i=0;i<ms.length;i++){
    const m=ms[i],id=m[1],start=m.index+m[0].length,end=i+1<ms.length?ms[i+1].index:clean.length;
    const raw=clean.slice(start,end).trim();
    const cms=[...raw.matchAll(/(?:turn to|go to|see|flip to)\s+page\s+(\d+)/gi)];
    const choices=[];const seen=new Set();
    for(const c of cms){const t=c[1];if(seen.has(t))continue;seen.add(t);const b=raw.slice(Math.max(0,raw.indexOf(c[0])-120),raw.indexOf(c[0]));const pts=b.split(/[.!?\n]/);choices.push({text:(pts[pts.length-1]||'').trim().slice(0,100)||'Go to page '+t,target:t});}
    const disp=raw.replace(/(?:turn to|go to|see|flip to)\s+page\s+\d+[.,]?/gi,'').replace(/\n{3,}/g,'\n\n').trim();
    const isEnding=choices.length===0;
    const et=isEnding?(()=>{const l=raw.toLowerCase();return['congratulations','saved','hero'].some(w=>l.includes(w))?'good':['game over','trapped','doom'].some(w=>l.includes(w))?'bad':'neutral';})():null;
    pages[id]={text:disp,choices,isEnding,endingType:et};
  }
  const ec=Object.values(pages).filter(p=>p.isEnding).length;
  return{title,pages,startPage:Object.keys(pages).sort((a,b)=>+a-+b)[0]};
}

// ── HANDLE FILE ──
async function handleFile(file){
  show('parsing');document.getElementById('plog').innerHTML='';
  log('loading: '+file.name);log('size: '+(file.size/1024).toFixed(1)+' KB');
  const name=file.name.replace(/\.[^.]+$/,'').replace(/_/g,' ');
  try{
    let bookData,meta;
    if(file.name.match(/\.epub$/i)){
      log('epub — unpacking...');const res=await parseEpub(file);bookData=res.bookData;meta=res.meta;
    }else{
      let text=await file.text();
      if(file.name.match(/\.html?$/i))text=new DOMParser().parseFromString(text,'text/html').body.textContent;
      log('read '+text.length.toLocaleString()+' chars');
      bookData=parseTxt(text,name);
      if(!bookData){log('no pages found — try a .epub or CYOA .txt','warn');setTimeout(()=>{show('library');renderLibrary();},2000);return;}
      meta={id:'',title:name,author:'',publisher:'',year:'',description:'',series:'',totalPages:Object.keys(bookData.pages).length,totalEndings:Object.values(bookData.pages).filter(p=>p.isEnding).length,coverDataUrl:'',totalRuns:0,foundEndings:0,totalChoices:0};
    }
    const lib=libLoad();
    const dup=lib.find(b=>b.title===meta.title);
    if(dup){const id=dup.id;dup.coverDataUrl=meta.coverDataUrl||dup.coverDataUrl;libSave(lib);localStorage.setItem('bs5_pg_'+id,JSON.stringify(bookData));log('updated existing entry','ok');setTimeout(()=>{show('library');renderLibrary();},400);return;}
    const id='b'+Date.now();meta.id=id;lib.push(meta);libSave(lib);
    localStorage.setItem('bs5_pg_'+id,JSON.stringify(bookData));
    log('done!','ok');setTimeout(()=>{show('library');renderLibrary();},400);
  }catch(err){log('error: '+err.message,'warn');setTimeout(()=>{show('library');renderLibrary();},2000);}
}

function loadDemo(){
  const lib=libLoad();
  if(lib.find(b=>b.id==='demo'))return;
  const meta={id:'demo',title:DEMO.title,author:'Booksole Studios',publisher:'The Digital Prison',year:'2026',description:'MAX, nephew of horror author R.L. SPINE, is trapped inside the BOOKSOLE — a device built by the jealous neighbor VICTOR GRIMSHAW. Navigate the digital library, face the unfinished monsters, and find the exit. Or stay trapped forever.',series:'',totalPages:Object.keys(DEMO.pages).length,totalEndings:Object.values(DEMO.pages).filter(p=>p.isEnding).length,coverDataUrl:'',totalRuns:0,foundEndings:0,totalChoices:0};
  lib.unshift(meta);libSave(lib);
  localStorage.setItem('bs5_pg_demo',JSON.stringify(DEMO));
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(document.getElementById('app').style.display!=='none'&&book){
    if(document.getElementById('searchbar').style.display!=='none')return;
    const n=parseInt(e.key);if(n>=1&&n<=9){const pg=book.pages[cur().page];if(pg&&pg.choices[n-1])makeChoice(pg.choices[n-1].target);}
    if(e.key==='Backspace'&&!e.target.matches('input,textarea')){e.preventDefault();goBack();}
    if((e.ctrlKey||e.metaKey)&&e.key==='f'){e.preventDefault();openSearch();}
  }
  if(e.key==='Escape'){closeSearch();closeDetail();}
});
document.getElementById('sb-input').addEventListener('input',e=>doSearch(e.target.value));
document.getElementById('sb-input').addEventListener('keydown',e=>{if(e.key==='Escape')closeSearch();});
document.getElementById('screen').addEventListener('click',e=>{
  const sb=document.getElementById('searchbar');
  if(sb.style.display!=='none'&&!sb.contains(e.target))closeSearch();
  if(e.target===document.getElementById('detail'))closeDetail();
});

// ── WIRE UP ──
document.getElementById('fi').onchange=e=>{if(e.target.files[0])handleFile(e.target.files[0]);e.target.value='';};
document.getElementById('lib-add-btn').onclick=()=>document.getElementById('fi').click();
document.getElementById('det-play').onclick=()=>{if(detailBookId)launchBook(detailBookId);};
document.getElementById('det-close').onclick=closeDetail;
document.getElementById('det-del').onclick=()=>{
  if(!detailBookId)return;if(!confirm('Remove this book and all save data?'))return;
  libSave(libLoad().filter(b=>b.id!==detailBookId));
  deleteBookData(detailBookId);closeDetail();renderLibrary();toast('CARTRIDGE REMOVED');
};
document.getElementById('libbackbtn').onclick=goToLibrary;
document.getElementById('newrun').onclick=()=>{newSave();renderAll();};
document.getElementById('jbtn').onclick=()=>{renderJournal();show('journal');};
document.getElementById('jback').onclick=()=>show('app');
document.getElementById('exbtn').onclick=exportData;
document.getElementById('imbtn').onclick=importData;
document.getElementById('srchbtn').onclick=e=>{e.stopPropagation();openSearch();};
document.getElementById('backbtn').onclick=goBack;
document.getElementById('fup').onclick=()=>{fontSize=Math.min(20,fontSize+1);persist();renderStory();};
document.getElementById('fdn').onclick=()=>{fontSize=Math.max(10,fontSize-1);persist();renderStory();};

// ── THEME ──
function applyTheme(t){
  document.body.classList.toggle('light',t==='light');
  const lbl=t==='light'?'☾ DARK':'☀ LIGHT';
  const a=document.getElementById('themebtn'),b=document.getElementById('themebtn-lib');
  if(a)a.textContent=lbl;if(b)b.textContent=lbl;
}
function toggleTheme(){
  const t=document.body.classList.contains('light')?'dark':'light';
  localStorage.setItem('bs5_theme',t);applyTheme(t);
}
applyTheme(localStorage.getItem('bs5_theme')||'dark');
document.getElementById('themebtn').onclick=toggleTheme;
document.getElementById('themebtn-lib').onclick=toggleTheme;

// ── INIT: load demo cartridge silently ──
loadDemo();
</script>
</body>
